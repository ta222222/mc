<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>hammercam 3.0</title>
  <style>
    :root {
      --fg: #f5f5f5;
      --border: rgba(255, 255, 255, 0.28);
      --muted: rgba(255, 255, 255, 0.7);
      --muted-light: rgba(255, 255, 255, 0.45);
      --neon: #c8ff00;
      --neon-dim: #b8eb00;
      --danger: #ff7b7b;
      --radius: 4px;
      --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
      --safe-t: max(14px, env(safe-area-inset-top, 0px));
      --safe-r: max(14px, env(safe-area-inset-right, 0px));
      --safe-b: max(14px, env(safe-area-inset-bottom, 0px));
      --safe-l: max(14px, env(safe-area-inset-left, 0px));
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: 11px;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    .stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      overflow: hidden;
    }

    #video {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #view {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #111;
      display: none;
    }

    #view.mirrored { transform: scaleX(-1); }
    body.is-live #view { display: block; }

    .idle {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(320px, calc(100% - 40px));
      text-align: center;
      padding: 28px 22px;
      background: rgba(12, 12, 12, 0.72);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    body.is-live .idle { display: none; }

    .idle h1 {
      font: 700 13px/1.2 var(--font-mono);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .idle p {
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 18px;
      font-size: 10px;
    }

    .btn {
      appearance: none;
      -webkit-appearance: none;
      font: 700 11px/1 var(--font-mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.1);
      color: var(--fg);
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn-primary {
      background: var(--neon);
      border-color: var(--neon-dim);
      color: #0a0a0a;
      width: 100%;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    .btn-sm {
      min-height: 32px;
      padding: 0 10px;
      font-size: 10px;
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-sm.primary {
      background: var(--neon);
      border-color: var(--neon-dim);
      color: #0a0a0a;
    }

    .hud {
      position: absolute;
      z-index: 10;
      display: none;
      gap: 8px;
      pointer-events: none;
    }

    body.is-live .hud { display: flex; }

    .hud > * { pointer-events: auto; }

    .hud-top {
      position: absolute;
      top: var(--safe-t);
      left: var(--safe-l);
      right: var(--safe-r);
      justify-content: space-between;
      align-items: flex-start;
    }

    .hud-bottom {
      position: absolute;
      bottom: var(--safe-b);
      left: var(--safe-l);
      right: var(--safe-r);
      display: none;
      align-items: flex-end;
      justify-content: space-between;
      gap: 8px;
    }

    body.is-live .hud-bottom {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
    }

    .hud-bottom-left,
    .hud-bottom-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .hud-bottom-left {
      justify-content: flex-start;
    }

    .hud-bottom-mid {
      display: flex;
      justify-content: center;
    }

    .hud-bottom-right {
      justify-content: flex-end;
    }

    body.chrome-hidden .hud-chrome {
      display: none !important;
    }

    body.chrome-hidden .overlay {
      display: none !important;
    }

    body.chrome-hidden .hud-top {
      justify-content: flex-end;
    }

    .hud-zoom {
      position: absolute;
      z-index: 16;
      left: 50%;
      bottom: calc(var(--safe-b) + 84px);
      transform: translateX(-50%);
      display: none !important;
      gap: 0;
      align-items: center;
      background: rgba(10, 10, 10, 0.72);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
      pointer-events: auto;
      max-width: calc(100vw - 24px);
    }

    body.is-live .hud-zoom {
      display: flex !important;
    }

    body.chrome-hidden .hud-zoom {
      display: none !important;
    }

    .hud-zoom .hud-btn {
      min-width: 44px;
      min-height: 40px;
      padding: 0 11px;
      border: none;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    .hud-zoom .hud-btn + .hud-btn {
      border-left: 1px solid var(--border);
    }

    .hud-zoom .hud-btn.active {
      background: var(--neon);
      color: #0a0a0a;
    }

    .hud-btn {
      min-width: 44px;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(10, 10, 10, 0.55);
      color: var(--fg);
      font: 700 11px/1 var(--font-mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      touch-action: manipulation;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .hud-btn.icon {
      width: 44px;
      padding: 0;
      font-size: 20px;
      line-height: 1;
    }

    .hud-btn.primary {
      background: color-mix(in srgb, var(--neon) 80%, transparent);
      border-color: var(--neon-dim);
      color: #0a0a0a;
    }

    body.controls-open #toggle-controls {
      background: var(--neon);
      border-color: var(--neon-dim);
      color: #0a0a0a;
    }

    .toast {
      position: absolute;
      z-index: 12;
      left: 50%;
      top: calc(var(--safe-t) + 52px);
      bottom: auto;
      transform: translateX(-50%);
      max-width: min(90vw, 360px);
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 10px;
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .toast.error { color: var(--danger); }
    .toast:empty { display: none; }

    .overlay {
      position: absolute;
      z-index: 11;
      left: var(--safe-l);
      right: var(--safe-r);
      bottom: calc(var(--safe-b) + 100px);
      margin: 0 auto;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(10, 10, 10, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: none;
      flex-direction: column;
      gap: 11px;
      max-height: min(52dvh, 400px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }

    body.controls-open .overlay { display: flex; }

    .overlay-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .rail {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted-light);
    }

    .badge {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 8px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .ctrl {
      display: grid;
      grid-template-columns: 5.4rem minmax(0, 1fr) 2.6rem;
      align-items: center;
      gap: 8px;
    }

    .ctrl label {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-light);
    }

    .ctrl output {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 10px;
    }

    .ctrl input[type="range"] {
      width: 100%;
      accent-color: var(--neon-dim);
      touch-action: none;
    }

    .ctrl select {
      width: 100%;
      padding: 8px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      font: 10px/1.3 var(--font-mono);
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <video id="video" playsinline webkit-playsinline muted autoplay></video>
    <canvas id="view" aria-label="dithered camera"></canvas>

    <div class="idle" id="idle">
      <h1>hammercam 3.0</h1>
      <p>Fullscreen Floyd–Steinberg camera. Start, then open Controls to tweak the look.</p>
      <button type="button" class="btn btn-primary" id="start-btn">Start camera</button>
    </div>

    <div class="hud hud-top" id="hud-top">
      <button type="button" class="hud-btn hud-chrome" id="flip-btn">Flip</button>
      <button type="button" class="hud-btn icon" id="stop-btn" aria-label="Stop">×</button>
    </div>

    <div class="hud hud-zoom hud-chrome" id="zoom-bar" role="group" aria-label="Camera zoom">
      <button type="button" class="hud-btn" data-zoom="0.5" title="Ultra-wide / fisheye">0.5</button>
      <button type="button" class="hud-btn active" data-zoom="1">1×</button>
      <button type="button" class="hud-btn" data-zoom="2">2×</button>
      <button type="button" class="hud-btn" data-zoom="4">4×</button>
      <button type="button" class="hud-btn" data-zoom="6">6×</button>
    </div>

    <div class="hud hud-bottom hud-chrome" id="hud-bottom">
      <div class="hud-bottom-left">
        <button type="button" class="hud-btn primary" id="snap-btn">Save</button>
        <button type="button" class="hud-btn" id="snap-png-btn">Snap png</button>
      </div>
      <div class="hud-bottom-mid">
        <button type="button" class="hud-btn" id="toggle-chrome" aria-label="Hide controls">Hide UI</button>
      </div>
      <div class="hud-bottom-right">
        <span class="badge" id="facing-badge">rear</span>
        <button type="button" class="hud-btn" id="toggle-controls">Controls</button>
      </div>
    </div>

    <div class="overlay" id="overlay" aria-hidden="true">
      <div class="overlay-head">
        <p class="rail">Output settings</p>
        <button type="button" class="btn btn-sm" id="hide-controls">Hide</button>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-sm" id="reset-btn">Reset</button>
        <button type="button" class="btn btn-sm primary" id="snap-btn-2">Snap png</button>
      </div>

      <div class="ctrl">
        <label for="preset">Preset</label>
        <select id="preset">
          <option value="default">Default</option>
          <option value="v1">V1 G00D</option>
          <option value="soft">Soft</option>
          <option value="hard">Hard</option>
          <option value="test4444">test4444</option>
        </select>
        <span></span>
      </div>
      <div class="ctrl">
        <label for="pixel">Pixel</label>
        <input type="range" id="pixel" min="0.2" max="3" step="0.01" value="0.75">
        <output id="pixel-val" for="pixel">0.75</output>
      </div>
      <div class="ctrl">
        <label for="threshold">Threshold</label>
        <input type="range" id="threshold" min="40" max="215" step="1" value="128">
        <output id="threshold-val" for="threshold">128</output>
      </div>
      <div class="ctrl">
        <label for="contrast">Contrast</label>
        <input type="range" id="contrast" min="0.5" max="3" step="0.05" value="1.2">
        <output id="contrast-val" for="contrast">1.20</output>
      </div>
      <div class="ctrl">
        <label for="strength">Strength</label>
        <input type="range" id="strength" min="0" max="2" step="0.05" value="1">
        <output id="strength-val" for="strength">1.00</output>
      </div>
    </div>

    <div class="toast" id="toast" aria-live="polite"></div>
  </div>

  <script>
    (function () {
      'use strict';

      var presets = {
        default: { pixel: 0.75, threshold: 128, contrast: 1.2, strength: 1 },
        v1: { pixel: 0.35, threshold: 40, contrast: 2.25, strength: 0.65 },
        soft: { pixel: 1.25, threshold: 140, contrast: 0.9, strength: 0.75 },
        hard: { pixel: 0.9, threshold: 100, contrast: 2.0, strength: 1.25 },
        test4444: { pixel: 0.22, threshold: 44, contrast: 1.55, strength: 0.11 }
      };

      var video = document.getElementById('video');
      var view = document.getElementById('view');
      var toastEl = document.getElementById('toast');
      var overlay = document.getElementById('overlay');
      var facingBadge = document.getElementById('facing-badge');
      var startBtn = document.getElementById('start-btn');
      var stopBtn = document.getElementById('stop-btn');
      var flipBtn = document.getElementById('flip-btn');
      var snapBtn = document.getElementById('snap-btn');
      var snapPngBtn = document.getElementById('snap-png-btn');
      var snapBtn2 = document.getElementById('snap-btn-2');
      var resetBtn = document.getElementById('reset-btn');
      var toggleControlsBtn = document.getElementById('toggle-controls');
      var toggleChromeBtn = document.getElementById('toggle-chrome');
      var hideControlsBtn = document.getElementById('hide-controls');
      var stageEl = document.getElementById('stage');
      var zoomBar = document.getElementById('zoom-bar');
      var toastTimer = 0;
      var presetEl = document.getElementById('preset');
      var pixelEl = document.getElementById('pixel');
      var thresholdEl = document.getElementById('threshold');
      var contrastEl = document.getElementById('contrast');
      var strengthEl = document.getElementById('strength');
      var pixelVal = document.getElementById('pixel-val');
      var thresholdVal = document.getElementById('threshold-val');
      var contrastVal = document.getElementById('contrast-val');
      var strengthVal = document.getElementById('strength-val');

      var work = document.createElement('canvas');
      var wctx = work.getContext('2d', { willReadFrequently: true, alpha: false });
      var vctx = view.getContext('2d', { alpha: false });
      var exportWork = document.createElement('canvas');
      var exportOut = document.createElement('canvas');
      var gray = null;

      var stream = null;
      var facingMode = 'environment';
      var running = false;
      var starting = false;
      var raf = 0;
      var processing = false;
      var adaptiveMaxW = 360;
      var lockedKey = '';
      var lastPixel = -1;
      var zoomFactor = 1;
      var zoomAnim = 1;
      var fisheyeBuf = null;
      var fisheyeTmp = document.createElement('canvas');
      var fisheyeCtx = fisheyeTmp.getContext('2d', { willReadFrequently: true, alpha: false });

      function settings() {
        return {
          pixel: +pixelEl.value,
          threshold: +thresholdEl.value,
          contrast: +contrastEl.value,
          strength: +strengthEl.value
        };
      }

      function syncLabels() {
        var s = settings();
        pixelVal.textContent = s.pixel.toFixed(2);
        thresholdVal.textContent = String(s.threshold);
        contrastVal.textContent = s.contrast.toFixed(2);
        strengthVal.textContent = s.strength.toFixed(2);
      }

      function toast(msg, isError) {
        if (toastTimer) {
          clearTimeout(toastTimer);
          toastTimer = 0;
        }
        toastEl.textContent = msg || '';
        toastEl.classList.toggle('error', !!isError);
      }

      function toastTemp(msg, ms, isError) {
        toast(msg, isError);
        toastTimer = setTimeout(function () {
          toastEl.textContent = '';
          toastTimer = 0;
        }, ms || 1400);
      }

      function setChromeHidden(hidden) {
        document.body.classList.toggle('chrome-hidden', !!hidden);
        if (hidden) setControlsOpen(false);
      }

      function applySettings(s) {
        pixelEl.value = s.pixel;
        thresholdEl.value = s.threshold;
        contrastEl.value = s.contrast;
        strengthEl.value = s.strength;
        syncLabels();
      }

      function setControlsOpen(open) {
        document.body.classList.toggle('controls-open', open);
        toggleControlsBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
        overlay.setAttribute('aria-hidden', open ? 'false' : 'true');
      }

      function syncFacingUi() {
        var rear = facingMode === 'environment';
        facingBadge.textContent = rear ? 'rear' : 'front';
        view.classList.toggle('mirrored', !rear);
      }

      function syncZoomUi() {
        var buttons = zoomBar.querySelectorAll('[data-zoom]');
        for (var i = 0; i < buttons.length; i++) {
          var btn = buttons[i];
          btn.classList.toggle('active', Math.abs(+btn.getAttribute('data-zoom') - zoomFactor) < 0.001);
        }
      }

      function setZoom(factor) {
        zoomFactor = factor;
        syncZoomUi();
        toastTemp(factor === 0.5 ? '0.5× wide' : factor + '×', 800);
      }

      // Pure JS zoom — center crop for 1×+, faux fisheye wide for 0.5×
      function drawVideoFrame(ctx, destW, destH) {
        var vw = video.videoWidth || destW;
        var vh = video.videoHeight || destH;
        if (vw < 2 || vh < 2) return;

        // Smooth toward selected zoom (iPhone-like)
        zoomAnim += (zoomFactor - zoomAnim) * 0.22;
        if (Math.abs(zoomAnim - zoomFactor) < 0.004) zoomAnim = zoomFactor;

        var z = zoomAnim;
        ctx.imageSmoothingEnabled = false;

        if (z >= 0.98) {
          var factor = Math.max(1, z);
          var cw = vw / factor;
          var ch = vh / factor;
          var sx = (vw - cw) * 0.5;
          var sy = (vh - ch) * 0.5;
          ctx.drawImage(video, sx, sy, cw, ch, 0, 0, destW, destH);
          return;
        }

        // 0.5×: digital “ultra-wide” — full frame + barrel fisheye
        drawFisheyeVideo(ctx, destW, destH, 0.42 + (1 - z) * 0.35);
      }

      function drawFisheyeVideo(ctx, destW, destH, strength) {
        if (fisheyeTmp.width !== destW || fisheyeTmp.height !== destH) {
          fisheyeTmp.width = destW;
          fisheyeTmp.height = destH;
        }
        fisheyeCtx.imageSmoothingEnabled = false;
        fisheyeCtx.drawImage(video, 0, 0, destW, destH);

        var src = fisheyeCtx.getImageData(0, 0, destW, destH);
        var out = ctx.createImageData(destW, destH);
        var sdata = src.data;
        var odata = out.data;
        var cx = (destW - 1) * 0.5;
        var cy = (destH - 1) * 0.5;
        var maxR = Math.sqrt(cx * cx + cy * cy) || 1;
        var k = strength;
        var x, y, dx, dy, r, rN, rSrc, theta, sx, sy, ix, iy, idx, sidx;

        for (y = 0; y < destH; y++) {
          for (x = 0; x < destW; x++) {
            dx = x - cx;
            dy = y - cy;
            r = Math.sqrt(dx * dx + dy * dy);
            rN = r / maxR;
            rSrc = r * (1 + k * rN * rN);
            if (r < 0.0001) {
              sx = cx;
              sy = cy;
            } else {
              theta = Math.atan2(dy, dx);
              sx = cx + Math.cos(theta) * rSrc;
              sy = cy + Math.sin(theta) * rSrc;
            }
            ix = sx < 0 ? 0 : sx > destW - 1 ? destW - 1 : sx | 0;
            iy = sy < 0 ? 0 : sy > destH - 1 ? destH - 1 : sy | 0;
            idx = (y * destW + x) * 4;
            sidx = (iy * destW + ix) * 4;
            odata[idx] = sdata[sidx];
            odata[idx + 1] = sdata[sidx + 1];
            odata[idx + 2] = sdata[sidx + 2];
            odata[idx + 3] = 255;
          }
        }
        ctx.putImageData(out, 0, 0);
      }

      function setRunningUi(isOn) {
        document.body.classList.toggle('is-live', isOn);
        if (!isOn) {
          setControlsOpen(false);
          setChromeHidden(false);
        }
      }

      // Fast FS on luminance buffer — same look, smoother on iPhone
      function ditherGray(data, width, height, opts) {
        var len = width * height;
        if (!gray || gray.length !== len) gray = new Float32Array(len);

        var contrast = opts.contrast;
        var threshold = opts.threshold;
        var strength = opts.strength;
        var mid = 128;
        var i, x, y, idx, g, v, err, n;

        for (i = 0; i < len; i++) {
          idx = i * 4;
          g = data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114;
          g = (g - mid) * contrast + mid;
          gray[i] = g < 0 ? 0 : g > 255 ? 255 : g;
        }

        for (y = 0; y < height; y++) {
          for (x = 0; x < width; x++) {
            i = y * width + x;
            g = gray[i];
            v = g < threshold ? 0 : 255;
            err = (g - v) * strength;
            gray[i] = v;

            if (x + 1 < width) gray[i + 1] += err * (7 / 16);
            if (y + 1 < height) {
              if (x > 0) gray[i + width - 1] += err * (3 / 16);
              gray[i + width] += err * (5 / 16);
              if (x + 1 < width) gray[i + width + 1] += err * (1 / 16);
            }
          }
        }

        for (i = 0; i < len; i++) {
          v = gray[i] < 128 ? 0 : 255;
          idx = i * 4;
          data[idx] = data[idx + 1] = data[idx + 2] = v;
        }
      }

      function processFrame() {
        if (!running || video.readyState < 2) return;

        var t0 = performance.now();

        try {
          var s = settings();
          var scale = Math.max(0.2, s.pixel);
          var vw = video.videoWidth || 640;
          var vh = video.videoHeight || 480;

          if (s.pixel !== lastPixel) {
            lastPixel = s.pixel;
            adaptiveMaxW = 360;
            lockedKey = '';
          }

          // Fine look with adaptive cap so Pro Max stays fluid
          var maxW = Math.min(480, Math.max(220, adaptiveMaxW | 0));
          var w = Math.min(maxW, Math.max(1, Math.round(vw / scale)));
          var h = Math.max(1, Math.round(vh * (w / vw)));
          var chunk = Math.max(1, Math.round(scale));
          var outW = w * chunk;
          var outH = h * chunk;
          var key = w + 'x' + h + ':' + outW + 'x' + outH;

          // Only resize when size actually changes — resizing clears canvas (flicker/freeze feel)
          if (key !== lockedKey) {
            lockedKey = key;
            if (work.width !== w || work.height !== h) {
              work.width = w;
              work.height = h;
            }
            if (view.width !== outW || view.height !== outH) {
              view.width = outW;
              view.height = outH;
            }
          }

          wctx.imageSmoothingEnabled = false;
          drawVideoFrame(wctx, w, h);
          var imageData = wctx.getImageData(0, 0, w, h);
          ditherGray(imageData.data, w, h, s);
          wctx.putImageData(imageData, 0, 0);

          vctx.imageSmoothingEnabled = false;
          vctx.drawImage(work, 0, 0, outW, outH);
        } catch (err) {
          toast('Render error', true);
          console.error(err);
        }

        var dt = performance.now() - t0;
        if (dt > 26) adaptiveMaxW = Math.max(220, adaptiveMaxW - 30);
        else if (dt < 12) adaptiveMaxW = Math.min(480, adaptiveMaxW + 16);
      }

      function loop() {
        if (!running) return;
        raf = requestAnimationFrame(loop);
        if (processing) return;
        processing = true;
        try {
          processFrame();
        } finally {
          processing = false;
        }
      }

      function stopStreamOnly() {
        if (raf) {
          cancelAnimationFrame(raf);
          raf = 0;
        }
        if (stream) {
          stream.getTracks().forEach(function (t) { t.stop(); });
          stream = null;
        }
        video.srcObject = null;
      }

      function stopCamera() {
        running = false;
        starting = false;
        processing = false;
        stopStreamOnly();
        setRunningUi(false);
        startBtn.disabled = false;
        startBtn.textContent = 'Start camera';
        toast('Stopped — tap Start camera');
      }

      function stabilizeTrack(mediaStream) {
        var track = mediaStream.getVideoTracks()[0];
        if (!track || !track.applyConstraints) return Promise.resolve();
        return track.applyConstraints({
          frameRate: { ideal: 30, max: 30 },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }).catch(function () {
          return track.applyConstraints({
            frameRate: { ideal: 30, max: 30 }
          }).catch(function () { /* ignore */ });
        });
      }

      async function getStream() {
        var attempts = [
          {
            audio: false,
            video: {
              facingMode: { ideal: facingMode },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
              frameRate: { ideal: 30, max: 30 }
            }
          },
          {
            audio: false,
            video: {
              facingMode: facingMode,
              width: { ideal: 1280 },
              height: { ideal: 720 },
              frameRate: { ideal: 30, max: 30 }
            }
          },
          {
            audio: false,
            video: true
          }
        ];

        var lastErr = null;
        for (var i = 0; i < attempts.length; i++) {
          try {
            var mediaStream = await navigator.mediaDevices.getUserMedia(attempts[i]);
            await stabilizeTrack(mediaStream);
            return mediaStream;
          } catch (err) {
            lastErr = err;
          }
        }
        throw lastErr || new Error('getUserMedia failed');
      }

      async function startCamera() {
        if (starting) return;

        if (!window.isSecureContext && location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
          toast('Camera needs HTTPS or localhost (not plain Wi‑Fi http / file).', true);
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          toast('Camera API unavailable in this browser.', true);
          return;
        }

        starting = true;
        startBtn.disabled = true;
        startBtn.textContent = 'Starting…';
        toast('Requesting camera…');

        try {
          // Keep canvas up during flip reclaim
          var wasLive = running;
          running = false;
          stopStreamOnly();

          stream = await getStream();
          video.srcObject = stream;
          video.setAttribute('playsinline', '');
          video.muted = true;

          await video.play();

          // Wait briefly for dimensions
          if (!video.videoWidth) {
            await new Promise(function (resolve) {
              var done = function () {
                video.removeEventListener('loadeddata', done);
                resolve();
              };
              video.addEventListener('loadeddata', done);
              setTimeout(resolve, 800);
            });
          }

          running = true;
          starting = false;
          processing = false;
          adaptiveMaxW = 360;
          lockedKey = '';
          lastPixel = -1;
          syncFacingUi();
          setRunningUi(true);
          startBtn.textContent = 'Start camera';
          // Re-apply selected zoom on the new track
          setZoom(zoomFactor);
          toastTemp('Live', 900);
          loop();

          if (!wasLive) setControlsOpen(false);
        } catch (err) {
          starting = false;
          running = false;
          stopStreamOnly();
          setRunningUi(false);
          startBtn.disabled = false;
          startBtn.textContent = 'Start camera';
          var name = err && err.name ? err.name : '';
          if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
            toast('Camera permission denied. Allow camera in Safari settings.', true);
          } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
            toast('No camera found on this device.', true);
          } else {
            toast('Could not start camera. Use HTTPS and allow permission.', true);
          }
          console.error(err);
        }
      }

      async function flipCamera() {
        if (!running || starting) return;
        facingMode = facingMode === 'environment' ? 'user' : 'environment';
        syncFacingUi();
        toastTemp('Switching…', 900);
        await startCamera();
      }

      function downloadPng(url, filename) {
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.rel = 'noopener';
        document.body.appendChild(a);
        a.click();
        a.remove();
      }

      function canvasToBlob(canvas) {
        return new Promise(function (resolve, reject) {
          if (!canvas.toBlob) {
            try {
              var data = canvas.toDataURL('image/png');
              var bin = atob(data.split(',')[1]);
              var arr = new Uint8Array(bin.length);
              for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
              resolve(new Blob([arr], { type: 'image/png' }));
            } catch (e) {
              reject(e);
            }
            return;
          }
          canvas.toBlob(function (blob) {
            if (blob) resolve(blob);
            else reject(new Error('encode failed'));
          }, 'image/png');
        });
      }

      function renderSharpExport() {
        var s = settings();
        var scale = Math.max(0.2, s.pixel);
        var vw = video.videoWidth || 1280;
        var vh = video.videoHeight || 720;

        // High-res dither for export (sharper than live preview canvas)
        var maxW = 1600;
        var w = Math.min(maxW, Math.max(1, Math.round(vw / scale)));
        var h = Math.max(1, Math.round(vh * (w / vw)));

        // Integer nearest-neighbor upscale so pixels stay crisp (~2–3k wide)
        var targetW = Math.max(1600, w * 3);
        var exportChunk = Math.max(2, Math.round(targetW / w));
        var outW = w * exportChunk;
        var outH = h * exportChunk;

        if (exportWork.width !== w || exportWork.height !== h) {
          exportWork.width = w;
          exportWork.height = h;
        }
        var ectx = exportWork.getContext('2d', { willReadFrequently: true, alpha: false });
        ectx.imageSmoothingEnabled = false;
        drawVideoFrame(ectx, w, h);
        var imageData = ectx.getImageData(0, 0, w, h);
        ditherGray(imageData.data, w, h, s);
        // Force opaque blacks/whites
        var data = imageData.data;
        for (var i = 0; i < data.length; i += 4) {
          var v = data[i] < 128 ? 0 : 255;
          data[i] = data[i + 1] = data[i + 2] = v;
          data[i + 3] = 255;
        }
        ectx.putImageData(imageData, 0, 0);

        if (exportOut.width !== outW || exportOut.height !== outH) {
          exportOut.width = outW;
          exportOut.height = outH;
        }
        var octx = exportOut.getContext('2d', { alpha: false });
        octx.imageSmoothingEnabled = false;
        octx.fillStyle = '#000';
        octx.fillRect(0, 0, outW, outH);
        octx.drawImage(exportWork, 0, 0, outW, outH);
        return exportOut;
      }

      async function snap() {
        if (!running || video.readyState < 2) {
          toast('Nothing to save yet');
          return;
        }

        var filename = 'hammercam-' + Date.now() + '.png';
        toast('Rendering sharp PNG…');

        try {
          var canvas = renderSharpExport();
          var blob = await canvasToBlob(canvas);
          var file = new File([blob], filename, { type: 'image/png' });

          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
              await navigator.share({ files: [file], title: 'hammercam' });
              toastTemp('Shared — Save Image for Photos', 1600);
              return;
            } catch (shareErr) {
              if (shareErr && shareErr.name === 'AbortError') {
                toastTemp('Save cancelled', 1200);
                return;
              }
            }
          }

          var url = URL.createObjectURL(blob);
          downloadPng(url, filename);
          setTimeout(function () { URL.revokeObjectURL(url); }, 2500);
          toastTemp('Saved sharp PNG', 1600);
        } catch (err) {
          console.error(err);
          try {
            var fallback = renderSharpExport();
            downloadPng(fallback.toDataURL('image/png'), filename);
            toastTemp('Saved sharp PNG', 1600);
          } catch (err2) {
            toast('Could not save PNG', true);
          }
        }
      }

      [pixelEl, thresholdEl, contrastEl, strengthEl].forEach(function (el) {
        el.addEventListener('input', syncLabels);
      });

      presetEl.addEventListener('change', function () {
        var key = presetEl.value;
        if (key && presets[key]) applySettings(presets[key]);
      });

      startBtn.addEventListener('click', function (e) {
        e.preventDefault();
        startCamera();
      });
      stopBtn.addEventListener('click', function (e) {
        e.preventDefault();
        stopCamera();
      });
      flipBtn.addEventListener('click', function (e) {
        e.preventDefault();
        flipCamera();
      });
      zoomBar.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-zoom]');
        if (!btn) return;
        e.preventDefault();
        setZoom(+btn.getAttribute('data-zoom'));
      });
      snapBtn.addEventListener('click', function (e) {
        e.preventDefault();
        snap();
      });
      snapPngBtn.addEventListener('click', function (e) {
        e.preventDefault();
        snap();
      });
      snapBtn2.addEventListener('click', function (e) {
        e.preventDefault();
        snap();
      });
      toggleControlsBtn.addEventListener('click', function (e) {
        e.preventDefault();
        setControlsOpen(!document.body.classList.contains('controls-open'));
      });
      toggleChromeBtn.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        setChromeHidden(true);
        toastTemp('Tap screen to show UI', 1600);
      });
      hideControlsBtn.addEventListener('click', function (e) {
        e.preventDefault();
        setControlsOpen(false);
      });
      stageEl.addEventListener('click', function (e) {
        if (!document.body.classList.contains('chrome-hidden')) return;
        if (e.target.closest('button, a, input, select, label, .overlay')) return;
        setChromeHidden(false);
      });
      resetBtn.addEventListener('click', function (e) {
        e.preventDefault();
        presetEl.value = 'default';
        applySettings(presets.default);
        toastTemp('Reset to default', 1200);
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          if (document.body.classList.contains('chrome-hidden')) setChromeHidden(false);
          else if (document.body.classList.contains('controls-open')) setControlsOpen(false);
          else if (running) stopCamera();
        }
      });

      applySettings(presets.default);
      presetEl.value = 'default';
      syncZoomUi();
      setRunningUi(false);
      setControlsOpen(false);
      toast('Fullscreen ready — tap Start camera');
    })();
  </script>
</body>
</html>
